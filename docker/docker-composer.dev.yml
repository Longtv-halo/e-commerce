version: '3.8'

services:
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml
      - ../logs:/logs
    command:
      - -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      # Sử dụng ../ để đi từ thư mục /docker ra /e-commerce, rồi đi vào /prometheus
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9097:9090"
    # Thêm dòng này nếu bạn muốn Prometheus kết nối trực tiếp với Spring Boot chạy ở localhost máy host
    extra_hosts:
      - "host.docker.internal:host-gateway"
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    restart: unless-stopped
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://longtv1:09052001@postgres:5432/ecommerce?sslmode=disable"
    depends_on:
      - postgres

  postgres:
    image: postgres:16.3-alpine
    container_name: ecommerce-postgres
    environment:
      POSTGRES_USER: longtv1
      POSTGRES_PASSWORD: "09052001"
      POSTGRES_DB: ecommerce
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9003"
      - "9001:9004"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: StrongPassword123!
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9004"

volumes:
  pgdata:
  minio_data: