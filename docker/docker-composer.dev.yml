services:
  postgres:
    image: postgres:16.3-alpine
    container_name: ecommerce-postgres
    environment:
     POSTGRES_USER: longtv1
     POSTGRES_PASSWORD: 09052001
     POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
volumes:
  pgdata: