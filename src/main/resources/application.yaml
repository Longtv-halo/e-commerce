management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: ecommerce-service
resilience4j:
  circuitbreaker:
    instances:
      paymentService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 30s